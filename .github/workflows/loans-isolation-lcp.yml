name: Loans Isolation + LCP Gates

on:
  pull_request:
    paths:
      - 'public/calculators/loans/**'
      - 'public/loans/**'
      - 'public/assets/css/**'
      - 'public/assets/js/**'
      - 'public/config/**'
      - 'scripts/**'
      - 'requirements/universal-rules/**'
      - 'package.json'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_route:
        description: 'Scoped route for stable pre-release LCP gate (example: /loans/car-loan/)'
        required: true
        default: '/loans/how-much-can-i-borrow/'

jobs:
  guardrails-fast:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Verify Route Bundles
        run: npm run verify:css:route-bundles

      - name: Isolation Scope Guard
        run: npm run test:isolation:scope

      - name: Resolve Scoped TARGET_ROUTE
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DIFF_RANGE="${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
          else
            DIFF_RANGE="HEAD~1...HEAD"
          fi

          ROUTE=$(git diff --name-only "$DIFF_RANGE" \
            | sed -nE 's#^public/loans/([^/]+)/.*#/loans/\1/#p' \
            | head -n1)

          if [[ -z "$ROUTE" ]]; then
            ROUTE="/loans/how-much-can-i-borrow/"
          fi

          echo "TARGET_ROUTE=$ROUTE" >> "$GITHUB_ENV"
          echo "LCP_ROUTE_INCLUDE=$ROUTE" >> "$GITHUB_ENV"
          echo "Scoped TARGET_ROUTE=$ROUTE"

      - name: Start Local Static Server
        run: |
          nohup python3 -m http.server 8000 --directory public > /tmp/calchowmuch-server.log 2>&1 &
          sleep 2

      - name: Loans LCP Hard Gate (FAST, Scoped)
        env:
          LH_MODE: fast
          LH_ASSUME_SERVER_RUNNING: 1
        run: npm run test:lcp:loans

  prerelease-stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Verify Route Bundles
        run: npm run verify:css:route-bundles

      - name: Set Scoped Route
        shell: bash
        run: |
          ROUTE="${{ github.event.inputs.target_route }}"
          if [[ -z "$ROUTE" ]]; then
            echo "target_route input is required"
            exit 1
          fi

          if [[ "$ROUTE" != /* ]]; then
            ROUTE="/$ROUTE"
          fi
          if [[ "$ROUTE" != */ ]]; then
            ROUTE="$ROUTE/"
          fi

          echo "TARGET_ROUTE=$ROUTE" >> "$GITHUB_ENV"
          echo "LCP_ROUTE_INCLUDE=$ROUTE" >> "$GITHUB_ENV"
          echo "Scoped TARGET_ROUTE=$ROUTE"

      - name: Loans LCP Hard Gate (STABLE, Scoped Median)
        env:
          LH_MODE: stable
          LH_RUNS: 3
          LH_WARMUP_RUN: 1
        run: npm run test:lcp:loans
