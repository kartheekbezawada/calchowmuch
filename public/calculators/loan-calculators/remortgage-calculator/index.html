<div id="calc-remortgage-switching">
  <div class="calculator-ui remo-ui">
    <section class="remo-hero" aria-label="Remortgage switching calculator">
      <div class="remo-form-panel">
        <section class="remo-section" aria-label="Current Mortgage">
          <div class="input-grid-2-col">
            <!-- Balance -->
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="remo-balance">Current Balance</label>
                <span class="slider-value" id="remo-balance-display">220,000</span>
              </div>
              <input
                id="remo-balance"
                type="range"
                min="0"
                max="1000000"
                step="1000"
                value="220000"
              />
              <div class="slider-precision-row">
                <label class="slider-precision-label" for="remo-balance-field">Exact current balance</label>
                <input
                  class="slider-precision-input"
                  id="remo-balance-field"
                  type="text"
                  inputmode="numeric"
                  maxlength="12"
                  value="220000"
                />
              </div>
            </div>

            <!-- Rate -->
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="remo-current-rate">Current Rate (%)</label>
                <span class="slider-value" id="remo-current-rate-display">6.00%</span>
              </div>
              <input
                id="remo-current-rate"
                type="range"
                min="0"
                max="15"
                step="0.05"
                value="6.00"
              />
              <div class="slider-precision-row">
                <label class="slider-precision-label" for="remo-current-rate-field">Exact current rate</label>
                <input
                  class="slider-precision-input"
                  id="remo-current-rate-field"
                  type="text"
                  inputmode="decimal"
                  maxlength="12"
                  value="6.00"
                />
              </div>
            </div>

            <!-- Term -->
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="remo-term">Remaining Term</label>
                <span class="slider-value" id="remo-term-display">20 yrs</span>
              </div>
              <input id="remo-term" type="range" min="1" max="40" step="1" value="20" />
              <div class="slider-precision-row">
                <label class="slider-precision-label" for="remo-term-field">Exact remaining term in years</label>
                <input
                  class="slider-precision-input"
                  id="remo-term-field"
                  type="text"
                  inputmode="numeric"
                  maxlength="12"
                  value="20"
                />
              </div>
            </div>
          </div>
        </section>

        <section class="remo-section" aria-label="New Deal">
          <div class="input-grid-2-col">
            <!-- New Rate -->
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="remo-new-rate">New Rate (%)</label>
                <span class="slider-value" id="remo-new-rate-display">5.00%</span>
              </div>
              <input id="remo-new-rate" type="range" min="0" max="15" step="0.05" value="5.00" />
              <div class="slider-precision-row">
                <label class="slider-precision-label" for="remo-new-rate-field">Exact new rate</label>
                <input
                  class="slider-precision-input"
                  id="remo-new-rate-field"
                  type="text"
                  inputmode="decimal"
                  maxlength="12"
                  value="5.00"
                />
              </div>
            </div>

            <!-- New Term -->
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="remo-new-term">New Term</label>
                <span class="slider-value" id="remo-new-term-display">20 yrs</span>
              </div>
              <input id="remo-new-term" type="range" min="1" max="40" step="1" value="20" />
              <div class="slider-precision-row">
                <label class="slider-precision-label" for="remo-new-term-field">Exact new term in years</label>
                <input
                  class="slider-precision-input"
                  id="remo-new-term-field"
                  type="text"
                  inputmode="numeric"
                  maxlength="12"
                  value="20"
                />
              </div>
            </div>
          </div>
        </section>

        <section class="remo-section" aria-labelledby="section-horizon">
          <div class="input-row slider-row">
            <div class="slider-header">
              <label for="remo-horizon-years">Horizon (Years)</label>
              <span class="slider-value" id="remo-horizon-display">5 years</span>
            </div>
            <input id="remo-horizon-years" type="range" min="2" max="10" step="1" value="5" />
            <div class="slider-precision-row">
              <label class="slider-precision-label" for="remo-horizon-field">Exact comparison horizon in years</label>
              <input
                class="slider-precision-input"
                id="remo-horizon-field"
                type="text"
                inputmode="numeric"
                maxlength="12"
                value="5"
              />
            </div>
            <div class="remo-horizon-tick-row" aria-hidden="true">
              <span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span
              ><span>9</span><span>10</span>
            </div>
          </div>
        </section>

        <div class="input-row action-row remo-action-row">
          <button class="calculator-button full-width" type="button" id="remo-calculate">
            Calculate Savings
          </button>
        </div>
      </div>

      <aside class="remo-result-dashboard" id="remo-results" aria-label="Switching summary">
        <p class="remo-dashboard-label">Switching Snapshot</p>

        <div class="remo-metric-grid">
          <!-- Monthly Saving (Primary) -->
          <div class="remo-metric remo-metric--primary">
            <span class="remo-metric__label">Monthly Saving</span>
            <span class="remo-metric__value" id="remo-metric-monthly" aria-live="polite">124</span>
          </div>

          <!-- Annual Saving -->
          <div class="remo-metric">
            <span class="remo-metric__label">Annual Saving</span>
            <span class="remo-metric__value" id="remo-metric-annual" aria-live="polite">1,491</span>
          </div>

          <!-- Break Even -->
          <div class="remo-metric">
            <span class="remo-metric__label">Break-Even</span>
            <span class="remo-metric__value" id="remo-metric-break-even" aria-live="polite"
              >Month 1</span
            >
          </div>

          <!-- Total Saving -->
          <div class="remo-metric">
            <span class="remo-metric__label">Total Saving</span>
            <span class="remo-metric__value" id="remo-metric-total" aria-live="polite">7,455</span>
          </div>
        </div>

        <p class="remo-result-note" id="remo-result-note" aria-live="polite">
          You save 124/mo by switching.
        </p>
        <div class="remo-error" id="remo-error" aria-live="polite"></div>
      </aside>
    </section>
  </div>
</div>
