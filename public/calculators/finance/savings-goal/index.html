<div id="calc-savings-goal">
  <div class="calculator-ui">
    <h2>Savings Goal Calculator</h2>
    <p class="helper">
      Estimate time to goal or required monthly savings with optional interest and compounding.
    </p>

    <div class="input-stack">
      <div class="input-row">
        <label id="sg-mode-label">Mode</label>
        <div class="button-group" role="group" aria-labelledby="sg-mode-label" data-button-group="sg-mode">
          <button class="calculator-button secondary is-active" type="button" data-value="time-to-goal" aria-pressed="true">
            Time to Goal
          </button>
          <button class="calculator-button secondary" type="button" data-value="monthly-needed" aria-pressed="false">
            Monthly Savings Needed
          </button>
        </div>
      </div>

      <div class="input-row">
        <label for="sg-goal">Savings Goal Amount</label>
        <input id="sg-goal" type="number" value="25000" min="0" step="0.01" />
      </div>

      <div class="input-row">
        <label for="sg-current">Current Savings</label>
        <input id="sg-current" type="number" value="5000" min="0" step="0.01" />
      </div>

      <div class="input-row" data-mode-row="time-to-goal">
        <label for="sg-monthly">Monthly Contribution</label>
        <input id="sg-monthly" type="number" value="500" min="0" step="0.01" />
      </div>

      <div class="input-row is-hidden" data-mode-row="monthly-needed" aria-hidden="true">
        <label for="sg-target-time">Target Time</label>
        <input id="sg-target-time" type="number" value="36" min="0" step="1" />
      </div>

      <div class="input-row is-hidden" data-mode-row="monthly-needed" aria-hidden="true">
        <label id="sg-time-unit-label">Time Unit</label>
        <div class="button-group" role="group" aria-labelledby="sg-time-unit-label" data-button-group="sg-time-unit">
          <button class="calculator-button secondary" type="button" data-value="years" aria-pressed="false">Years</button>
          <button class="calculator-button secondary is-active" type="button" data-value="months" aria-pressed="true">Months</button>
        </div>
      </div>
    </div>

    <button class="calculator-button secondary" type="button" id="sg-optional-toggle" aria-expanded="false" aria-controls="sg-optional-section">
      Show Optional Inputs
    </button>

    <div class="input-stack is-hidden" id="sg-optional-section" aria-hidden="true" hidden>
      <div class="input-row">
        <label for="sg-rate">Annual Interest Rate (APY %)</label>
        <input id="sg-rate" type="number" value="3" min="0" step="0.01" />
      </div>

      <div class="input-row">
        <label id="sg-compounding-label">Compounding Frequency</label>
        <div class="button-group" role="group" aria-labelledby="sg-compounding-label" data-button-group="sg-compounding">
          <button class="calculator-button secondary is-active" type="button" data-value="monthly" aria-pressed="true">Monthly</button>
          <button class="calculator-button secondary" type="button" data-value="quarterly" aria-pressed="false">Quarterly</button>
          <button class="calculator-button secondary" type="button" data-value="annual" aria-pressed="false">Annually</button>
        </div>
      </div>

      <div class="input-row">
        <label id="sg-timing-label">Contribution Timing</label>
        <div class="button-group" role="group" aria-labelledby="sg-timing-label" data-button-group="sg-timing">
          <button class="calculator-button secondary is-active" type="button" data-value="end" aria-pressed="true">End of Month</button>
          <button class="calculator-button secondary" type="button" data-value="beginning" aria-pressed="false">Beginning of Month</button>
        </div>
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="sg-calc">Calculate Savings Goal</button>

    <div class="result" id="sg-result" aria-live="polite"></div>
    <div class="result-detail" id="sg-result-detail" aria-live="polite"></div>
  </div>
</div>

<style>
  @import url('/calculators/finance/savings-goal/calculator.css');
</style>

<script type="module" src="/calculators/finance/savings-goal/module.js"></script>
