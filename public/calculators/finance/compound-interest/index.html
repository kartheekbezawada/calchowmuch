<div id="calc-compound-interest">
  <div class="calculator-ui">
    <h2>Compound Interest Calculator</h2>
    <p class="helper">
      Estimate your ending balance, total interest earned, and growth over time using compound interest.
    </p>

    <div class="input-stack">
      <div class="input-row">
        <label for="ci-principal">Initial Principal</label>
        <input id="ci-principal" type="number" value="10000" min="0" step="100" />
      </div>

      <div class="input-row">
        <label for="ci-rate">Annual Interest Rate (%)</label>
        <input id="ci-rate" type="number" value="5" min="0" step="0.01" />
      </div>

      <div class="input-row">
        <label for="ci-time">Time Period</label>
        <input id="ci-time" type="number" value="10" min="0" step="1" />
      </div>

      <div class="input-row">
        <label id="ci-period-type-label">Period Type</label>
        <div
          class="button-group"
          role="group"
          aria-labelledby="ci-period-type-label"
          data-button-group="ci-period-type"
        >
          <button class="calculator-button secondary is-active" type="button" data-value="years" aria-pressed="true">
            Years
          </button>
          <button class="calculator-button secondary" type="button" data-value="months" aria-pressed="false">
            Months
          </button>
        </div>
      </div>

      <div class="input-row">
        <label id="ci-compounding-label">Compounding Frequency</label>
        <div
          class="button-group"
          role="group"
          aria-labelledby="ci-compounding-label"
          data-button-group="ci-compounding"
        >
          <button class="calculator-button secondary" type="button" data-value="annual" aria-pressed="false">
            Annual
          </button>
          <button class="calculator-button secondary" type="button" data-value="semiannual" aria-pressed="false">
            Semi-Annual
          </button>
          <button class="calculator-button secondary" type="button" data-value="quarterly" aria-pressed="false">
            Quarterly
          </button>
          <button class="calculator-button secondary is-active" type="button" data-value="monthly" aria-pressed="true">
            Monthly
          </button>
          <button class="calculator-button secondary" type="button" data-value="daily" aria-pressed="false">
            Daily
          </button>
        </div>
      </div>
    </div>

    <button
      class="calculator-button secondary"
      type="button"
      id="ci-optional-toggle"
      aria-expanded="false"
      aria-controls="ci-optional-section"
    >
      Show Optional Inputs
    </button>

    <div class="input-stack is-hidden" id="ci-optional-section" aria-hidden="true" hidden>
      <div class="input-row">
        <label for="ci-contribution">Regular Contribution (per period)</label>
        <input id="ci-contribution" type="number" value="0" min="0" step="50" />
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="ci-calc">
      Calculate Compound Interest
    </button>

    <div class="result" id="ci-result" aria-live="polite"></div>
    <div class="result-detail" id="ci-result-detail" aria-live="polite"></div>
  </div>
</div>

<style>
  @import url('/calculators/finance/compound-interest/calculator.css');
</style>

<script type="module" src="/calculators/finance/compound-interest/module.js"></script>
