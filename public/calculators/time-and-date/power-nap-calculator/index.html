<div id="calc-power-nap">
  <div class="calculator-ui">
    <p class="helper">Enter your nap start time to see wake-up times for different nap lengths.</p>

    <div class="input-row">
      <label for="power-nap-start-time">Nap start time</label>
      <div class="input-with-button">
        <input id="power-nap-start-time" type="time" />
        <button class="calculator-button secondary" type="button" id="power-nap-use-now">
          Use now
        </button>
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="power-nap-calculate">
      Calculate
    </button>

    <div class="result" id="power-nap-results" aria-live="polite">
      <p class="placeholder" id="power-nap-placeholder">
        Enter a start time and click Calculate to see your nap options.
      </p>
      <p class="form-error is-hidden" id="power-nap-error"></p>
      <div class="power-nap-results-list is-hidden" id="power-nap-results-list"></div>
      <div class="evening-warning is-hidden" id="power-nap-warning">
        Long naps in the evening may affect your nighttime sleep. Consider a shorter nap if it is
        after 6:00 PM.
      </div>
    </div>
  </div>
</div>

<style>
  @import url('/calculators/time-and-date/power-nap-calculator/calculator.css');
</style>

<script type="module" src="/calculators/time-and-date/power-nap-calculator/module.js"></script>
