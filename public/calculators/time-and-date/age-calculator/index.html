<div id="calc-age" class="age-page">
  <div class="age-workbench">
    <section class="age-card age-input-card" aria-labelledby="age-input-title">
      <div class="age-card-head">
        <h2 id="age-input-title">Choose Dates</h2>
      </div>

      <div class="age-field-grid">
        <label class="age-field" for="age-dob">
          <span>Date of birth</span>
          <input id="age-dob" type="date" />
        </label>

        <label class="age-field" for="age-as-of">
          <span>Age as of</span>
          <input id="age-as-of" type="date" />
        </label>
      </div>

      <div class="age-action-row">
        <button class="calculator-button age-primary-button" type="button" id="age-calculate">
          Calculate age
        </button>
        <button class="calculator-button age-secondary-button" type="button" id="age-use-today">
          Use today
        </button>
      </div>

      <div class="age-error-slot" aria-live="polite">
        <p class="form-error is-hidden" id="age-error"></p>
      </div>
    </section>

    <section class="age-card age-answer-card" id="age-answer-section" aria-live="polite">
      <div class="age-answer-head">
        <div class="age-answer-copy">
          <p class="age-kicker">Exact age</p>
          <h2 id="age-headline">0 years, 0 months, 0 days</h2>
        </div>
      </div>
    </section>

    <section class="age-card age-overview-card" aria-labelledby="age-overview-title">
      <h2 class="age-overview-title" id="age-overview-title">Context, Totals, and Life Events</h2>

      <div class="age-answer-sections">
        <section class="age-answer-section age-context-section" aria-labelledby="age-context-label">
          <p class="age-section-label" id="age-context-label">Context</p>
          <p class="age-context-line" id="age-summary">As of today.</p>
        </section>

        <section class="age-answer-section age-totals-section" aria-labelledby="age-totals-label">
          <p class="age-section-label" id="age-totals-label">Totals</p>
          <dl class="age-data-list">
            <div class="age-data-row">
              <dt>Total months</dt>
              <dd><strong id="age-total-months">0</strong></dd>
            </div>

            <div class="age-data-row">
              <dt>Total weeks</dt>
              <dd><strong id="age-total-weeks">0</strong></dd>
            </div>

            <div class="age-data-row">
              <dt>Total days</dt>
              <dd><strong id="age-total-days">0</strong></dd>
            </div>
          </dl>
        </section>

        <section class="age-answer-section age-events-section" aria-labelledby="age-events-label">
          <p class="age-section-label" id="age-events-label">Life events</p>
          <dl class="age-data-list age-life-list">
            <div class="age-data-row age-data-row-rich">
              <dt>Next birthday</dt>
              <dd>
                <strong id="age-next-birthday-headline">In 0 days</strong>
                <p id="age-next-birthday-detail">Turns 0 on Jan 1, 2000</p>
              </dd>
            </div>

            <div class="age-data-row age-data-row-rich">
              <dt>Weekday of birth</dt>
              <dd>
                <strong id="age-born-weekday">Friday</strong>
                <p id="age-born-detail">Jun 15, 1990</p>
              </dd>
            </div>
          </dl>
        </section>
      </div>
    </section>
  </div>
</div>
