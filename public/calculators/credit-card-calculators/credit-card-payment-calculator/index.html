<div id="calc-cc-payoff">
  <div class="calculator-ui cc-payoff-ui">
    <section class="cc-payoff-hero" aria-label="Credit card repayment calculator">
      <div class="cc-payoff-form-panel">
        <p class="helper">
          Build a repayment roadmap with your current balance, APR, monthly payment, and extra
          payment strategy.
        </p>

        <div class="input-stack">
          <div class="input-row">
            <label for="cc-payoff-balance">Card Balance</label>
            <input id="cc-payoff-balance" type="number" value="8500" min="0" step="0.01" />
          </div>

          <div class="input-row">
            <label for="cc-payoff-apr">APR (%)</label>
            <input id="cc-payoff-apr" type="number" value="18.9" min="0" step="0.01" />
          </div>

          <div class="input-row">
            <label for="cc-payoff-payment">Monthly Payment</label>
            <input id="cc-payoff-payment" type="number" value="260" min="0" step="0.01" />
          </div>

          <div class="input-row">
            <label for="cc-payoff-extra">Extra Payment (optional)</label>
            <input id="cc-payoff-extra" type="number" value="10" min="0" step="0.01" />
          </div>
        </div>

        <div class="cc-payoff-action-row">
          <button class="calculator-button full-width" type="button" id="cc-payoff-calc">
            Calculate Payoff Plan
          </button>
        </div>
      </div>

      <aside class="cc-payoff-preview-panel" aria-label="Repayment snapshot">
        <div class="cc-payoff-preview-main">
          <p class="cc-payoff-preview-kicker">Projected payoff horizon</p>

          <div class="result" id="cc-payoff-result" aria-live="polite">
            <p class="placeholder" id="cc-payoff-placeholder">
              Enter values and click Calculate Payoff Plan.
            </p>
            <p class="form-error is-hidden" id="cc-payoff-error"></p>
            <div class="cc-payoff-results-list is-hidden" id="cc-payoff-results-list"></div>
          </div>

          <div class="result-detail" id="cc-payoff-summary" aria-live="polite">
            <p>Adjust payment and extra contribution to test faster payoff outcomes.</p>
          </div>
        </div>
      </aside>
    </section>
  </div>
</div>

<style>
  @import url('/calculators/credit-card-calculators/credit-card-payment-calculator/calculator.css');
</style>
