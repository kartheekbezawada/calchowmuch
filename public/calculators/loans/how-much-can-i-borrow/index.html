<div id="calc-how-much-can-borrow">
  <div class="calculator-ui borrow-ui">
    <section class="borrow-hero" aria-label="Borrowing power calculator">
      <div class="borrow-form-panel">
        <p class="helper">
          Estimate your maximum affordable loan using income multiples or a payment-to-income cap.
        </p>

        <section class="borrow-section" aria-label="Income and outgoings inputs">

          <!-- Row 1: Income & Deposit -->
          <div class="input-grid-2-col">
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="bor-gross-income">Gross Annual Income</label>
                <span class="slider-value" id="bor-gross-income-display">90,000</span>
              </div>
              <input id="bor-gross-income" type="range" value="90000" min="0" max="500000" step="1000" />
            </div>

            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="bor-deposit">Deposit Amount</label>
                <span class="slider-value" id="bor-deposit-display">0</span>
              </div>
              <input id="bor-deposit" type="range" value="0" min="0" max="1000000" step="1000" />
            </div>
          </div>

          <!-- Row 2: Expenses & Debts -->
          <div class="input-grid-2-col">
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="bor-expenses">Monthly Expenses</label>
                <span class="slider-value" id="bor-expenses-display">1,200</span>
              </div>
              <input id="bor-expenses" type="range" value="1200" min="0" max="15000" step="50" />
            </div>

            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="bor-debts">Monthly Debt Payments</label>
                <span class="slider-value" id="bor-debts-display">300</span>
              </div>
              <input id="bor-debts" type="range" value="300" min="0" max="15000" step="50" />
            </div>
          </div>
        </section>

        <section class="borrow-section" aria-label="Loan setup inputs">
          <!-- Row 3: Rate & Term -->
          <div class="input-grid-2-col">
            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="bor-rate">Interest Rate (APR %)</label>
                <span class="slider-value" id="bor-rate-display">6.50%</span>
              </div>
              <input id="bor-rate" type="range" value="6.5" min="0.1" max="20" step="0.1" />
            </div>

            <div class="input-row slider-row">
              <div class="slider-header">
                <label for="bor-term">Loan Term (years)</label>
                <span class="slider-value" id="bor-term-display">25 yrs</span>
              </div>
              <input id="bor-term" type="range" value="25" min="1" max="40" step="1" />
            </div>
          </div>

          <!-- Hidden inputs for logic compatibility -->
          <input type="hidden" id="bor-net-income" value="0">
          <input type="hidden" id="bor-multiple" value="4.5">

          <div class="borrow-payment-note is-hidden" id="bor-payment-note-row" aria-live="polite">
            <p class="borrow-context-note">
              Calculates borrowing power based on income multiplier (4.5x) and affordability checks.
            </p>
          </div>
        </section>

        <div class="input-row action-row borrow-action-row">
          <button class="calculator-button full-width" type="button" id="bor-calculate">
            Calculate Borrowing Power
          </button>
        </div>
      </div>

      <aside class="borrow-result-dashboard" aria-label="Borrowing capacity results">
        <p class="borrow-dashboard-label">Your Borrowing Capacity</p>

        <div class="borrow-metric-grid">
          <div class="borrow-metric borrow-metric--primary">
            <span class="borrow-metric__label">Maximum Borrow</span>
            <span class="borrow-metric__value" id="bor-metric-borrow" aria-live="polite">—</span>
          </div>
          <div class="borrow-metric borrow-metric--property">
            <span class="borrow-metric__label">Max Property</span>
            <span class="borrow-metric__value" id="bor-metric-property" aria-live="polite">—</span>
          </div>
          <div class="borrow-metric borrow-metric--payment">
            <span class="borrow-metric__label">Est. Monthly</span>
            <span class="borrow-metric__value" id="bor-metric-payment" aria-live="polite">—</span>
          </div>
          <div class="borrow-metric borrow-metric--disposable">
            <span class="borrow-metric__label">Disposable</span>
            <span class="borrow-metric__value" id="bor-metric-disposable" aria-live="polite">—</span>
          </div>
        </div>

        <div class="borrow-constraint-tag" id="bor-constraint" aria-live="polite"></div>
        <div class="borrow-error" id="bor-error" aria-live="polite"></div>
      </aside>
    </section>
  </div>
</div>

<style>
  @import url('/calculators/loans/how-much-can-i-borrow/calculator.css');
</style>
