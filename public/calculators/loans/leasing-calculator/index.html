<div id="calc-lease">
  <div id="calc-home-loan">
    <div class="calculator-ui home-loan-ui">
      <section class="mtg-hero" aria-label="Leasing calculator">
        <div class="mtg-form-panel">
          <p class="helper">
            Estimate lease monthly payment, yearly costs, and total lease spend with an ultra-glass
            slider-driven flow.
          </p>

          <div class="input-row slider-row">
            <div class="slider-header">
              <label for="lease-price">Vehicle Price</label>
              <span class="slider-value" id="lease-price-display">30,000</span>
            </div>
            <input id="lease-price" type="range" value="30000" min="5000" max="150000" step="500" />
          </div>

          <div class="input-row down-combined-left">
            <label id="lease-residual-type-label">Residual Type</label>
            <div
              class="button-group"
              role="group"
              aria-labelledby="lease-residual-type-label"
              data-button-group="lease-residual-type"
            >
              <button
                class="calculator-button secondary is-active"
                type="button"
                data-value="amount"
                aria-pressed="true"
              >
                Amount
              </button>
              <button
                class="calculator-button secondary"
                type="button"
                data-value="percent"
                aria-pressed="false"
              >
                Percent
              </button>
            </div>
          </div>

          <div class="input-row slider-row">
            <div class="slider-header">
              <label id="lease-residual-value-label" for="lease-residual-value">Residual Amount</label>
              <span class="slider-value" id="lease-residual-display">15,000</span>
            </div>
            <input id="lease-residual-value" type="range" value="15000" min="0" max="150000" step="100" />
          </div>

          <div class="input-row down-combined-left">
            <label id="lease-term-unit-label">Term Unit</label>
            <div
              class="button-group"
              role="group"
              aria-labelledby="lease-term-unit-label"
              data-button-group="lease-term-unit"
            >
              <button
                class="calculator-button secondary is-active"
                type="button"
                data-value="years"
                aria-pressed="true"
              >
                Years
              </button>
              <button
                class="calculator-button secondary"
                type="button"
                data-value="months"
                aria-pressed="false"
              >
                Months
              </button>
            </div>
          </div>

          <div class="input-row slider-row">
            <div class="slider-header">
              <label id="lease-term-label" for="lease-term">Lease Term (years)</label>
              <span class="slider-value" id="lease-term-display">3 yrs</span>
            </div>
            <input id="lease-term" type="range" value="3" min="1" max="6" step="0.5" />
          </div>

          <div class="input-row slider-row">
            <div class="slider-header">
              <label for="lease-factor">Money Factor</label>
              <span class="slider-value" id="lease-factor-display">0.0022</span>
            </div>
            <input id="lease-factor" type="range" value="0.0022" min="0" max="0.01" step="0.0001" />
          </div>

          <div class="input-row slider-row">
            <div class="slider-header">
              <label for="lease-upfront">Upfront Payment</label>
              <span class="slider-value" id="lease-upfront-display">1,500</span>
            </div>
            <input id="lease-upfront" type="range" value="1500" min="0" max="100000" step="100" />
          </div>

          <div class="input-row action-row mtg-action-row">
            <button class="calculator-button full-width" type="button" id="lease-calc">
              Calculate Lease
            </button>
          </div>
        </div>

        <aside class="mtg-preview-panel" aria-label="Lease scenario snapshot">
          <div class="mtg-preview-main">
            <p class="mtg-preview-label">Estimated Monthly Lease Payment</p>
            <div class="result mtg-result-card" id="lease-result" aria-live="polite"></div>
            <div class="result-detail mtg-summary-card" id="lease-summary" aria-live="polite"></div>
          </div>

          <div class="mtg-snapshot-list">
            <div class="mtg-snapshot-row">
              <span>Vehicle Price</span>
              <strong data-lease="price">-</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Residual</span>
              <strong><span data-lease="residual">-</span> (<span data-lease="residual-percent">-</span>)</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Cap Cost</span>
              <strong data-lease="cap-cost">-</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Term</span>
              <strong data-lease="term">-</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Money Factor</span>
              <strong data-lease="money-factor">-</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Upfront Payment</span>
              <strong data-lease="upfront">-</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Monthly Payment</span>
              <strong data-lease="monthly-payment">-</strong>
            </div>
            <div class="mtg-snapshot-row">
              <span>Total Lease Cost</span>
              <strong data-lease="total-cost">-</strong>
            </div>
          </div>
        </aside>
      </section>
    </div>
  </div>
</div>

<style>
  @import url('/calculators/loans/leasing-calculator/calculator.css');
</style>
