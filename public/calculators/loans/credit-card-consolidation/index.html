<div id="calc-cc-con">
  <div class="calculator-ui">
    <p class="helper">
      Compare paying your current credit cards separately versus consolidating into a fixed-rate loan.
    </p>

    <div class="input-stack">
      <div class="input-row">
        <label for="cc-con-balance">Total Card Balance</label>
        <input id="cc-con-balance" type="number" value="12000" min="0.01" step="0.01" inputmode="decimal" />
      </div>

      <div class="input-grid">
        <div class="input-row">
          <label for="cc-con-apr">Current Average APR (%)</label>
          <input id="cc-con-apr" type="number" value="19.5" min="0" step="0.01" inputmode="decimal" />
        </div>

        <div class="input-row">
          <label for="cc-con-payment">Current Monthly Payment</label>
          <input id="cc-con-payment" type="number" value="400" min="0.01" step="0.01" inputmode="decimal" />
        </div>
      </div>

      <div class="input-grid">
        <div class="input-row">
          <label for="cc-con-new-apr">Consolidation APR (%)</label>
          <input id="cc-con-new-apr" type="number" value="10.5" min="0" step="0.01" inputmode="decimal" />
        </div>

        <div class="input-row">
          <label for="cc-con-term">Consolidation Term (years)</label>
          <input id="cc-con-term" type="number" value="3" min="1" step="1" inputmode="decimal" />
        </div>
      </div>

      <div class="input-row">
        <label for="cc-con-fees">Consolidation Fees (optional)</label>
        <input id="cc-con-fees" type="number" value="250" min="0" step="0.01" inputmode="decimal" />
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="cc-con-calc">Calculate</button>

    <div class="result" id="cc-con-result" aria-live="polite">
      <p class="placeholder" id="cc-con-placeholder">Enter values and click Calculate.</p>
      <p class="form-error is-hidden" id="cc-con-error"></p>
      <div class="cc-con-results-list is-hidden" id="cc-con-results-list"></div>
    </div>

    <div class="result-detail is-hidden" id="cc-con-summary" aria-live="polite"></div>
  </div>
</div>

<style>
  @import url('/calculators/loans/credit-card-consolidation/calculator.css');
</style>
