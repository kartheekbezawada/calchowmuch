<div id="calc-percentage-of-a-number">
  <div class="calculator-ui">
    <p class="helper">What is X% of Y?</p>

    <div class="input-stack">
      <div class="input-row">
        <label for="pon-percent">Percentage (X)</label>
        <input id="pon-percent" type="number" value="20" step="any" />
      </div>

      <div class="input-row">
        <label for="pon-number">Number (Y)</label>
        <input id="pon-number" type="number" value="50" step="any" />
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="pon-calc">
      Calculate Percentage
    </button>

    <div class="result" id="pon-result" aria-live="polite"></div>
    <div class="result-detail" id="pon-result-detail" aria-live="polite"></div>
  </div>
</div>

<script
  type="module"
  src="/calculators/percentage-calculators/percentage-of-a-number/module.js"
></script>
