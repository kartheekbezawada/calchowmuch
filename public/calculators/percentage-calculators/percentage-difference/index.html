<div id="calc-percentage-difference">
  <div class="calculator-ui">
    <p class="helper">Calculate symmetric percentage difference between A and B.</p>

    <div class="input-stack">
      <div class="input-row">
        <label for="pct-diff-a">Value A</label>
        <input id="pct-diff-a" type="number" value="80" step="0.01" />
      </div>

      <div class="input-row">
        <label for="pct-diff-b">Value B</label>
        <input id="pct-diff-b" type="number" value="100" step="0.01" />
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="pct-diff-calc">
      Calculate Percentage Difference
    </button>

    <div class="result" id="pct-diff-result" aria-live="polite"></div>
    <div class="result-detail" id="pct-diff-result-detail" aria-live="polite"></div>
  </div>
</div>

<script
  type="module"
  src="/calculators/percentage-calculators/percentage-difference/module.js"
></script>
