<div id="calc-percentage-of-a-number">
  <link rel="stylesheet" href="/calculators/percentage-calculators/shared/cluster-light.css" />
  <link
    rel="preload"
    href="/calculators/percentage-calculators/percentage-of-a-number-calculator/calculator.css"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="/calculators/percentage-calculators/percentage-of-a-number-calculator/calculator.css"
    />
  </noscript>

  <div class="calculator-ui pct-answer-ui">
    <section class="pct-tool pon-hero" aria-label="Find percentage of a number calculator">
      <div class="pct-input-card">
        <h2 class="pct-input-title">Find the amount represented by any percentage</h2>
        <p class="pct-lead">
          Enter a percentage and a base number to get the exact amount in one clear result.
        </p>

        <div class="pct-field-grid">
          <div class="input-row">
            <label for="pon-percent">Percentage</label>
            <div class="pct-inline-input">
              <input id="pon-percent" type="number" value="20" step="any" inputmode="decimal" />
              <span class="pct-inline-suffix" aria-hidden="true">%</span>
            </div>
          </div>

          <div class="input-row">
            <label for="pon-number">Base number</label>
            <input id="pon-number" type="number" value="50" step="any" inputmode="decimal" />
          </div>
        </div>

        <div class="pct-actions">
          <p class="pct-stale-note" id="pon-stale-note" hidden aria-hidden="true">
            Inputs changed. Calculate again to refresh the answer.
          </p>
          <button class="calculator-button full-width" type="button" id="pon-calc">
            Calculate percentage
          </button>
        </div>
      </div>

      <aside class="pct-answer-card" id="pon-answer-card" aria-label="Percentage of a number answer">
        <div class="result pct-answer-value" id="pon-result" aria-live="polite">10.00</div>
        <p class="pct-answer-sentence" id="pon-result-detail" aria-live="polite">
          20.00% of 50.00 is 10.00.
        </p>
        <p class="pct-answer-context" id="pon-result-context" aria-live="polite">
          Formula: (X / 100) x Y.
        </p>

        <div class="pct-support-list" aria-label="Percentage of a number details">
          <div class="pct-support-row">
            <span>Percentage</span>
            <strong data-pon-snap="percent">20.00%</strong>
          </div>
          <div class="pct-support-row">
            <span>Base number</span>
            <strong data-pon-snap="number">50.00</strong>
          </div>
          <div class="pct-support-row">
            <span>Result</span>
            <strong data-pon-snap="result">10.00</strong>
          </div>
        </div>
      </aside>
    </section>
  </div>
</div>

<script
  type="module"
  src="/calculators/percentage-calculators/percentage-of-a-number-calculator/module.js"
></script>
