<div id="calc-margin-calculator">
  <div class="calculator-ui">
    <p class="helper">
      Calculate gross margin %, profit, and selling price from cost and margin targets.
    </p>

    <div class="input-stack">
      <div class="input-row">
        <label>Mode</label>
        <div class="mode-switch-control" role="group" aria-label="Margin mode">
          <span class="mode-switch-label is-active" data-margin-mode-label="cost-price">
            Cost + Price -> Margin %
          </span>
          <label class="mode-switch-toggle" for="margin-cost-margin-toggle">
            <input
              id="margin-cost-margin-toggle"
              type="checkbox"
              role="switch"
              aria-label="Switch to cost plus margin mode"
            />
            <span class="mode-switch-track" aria-hidden="true">
              <span class="mode-switch-thumb"></span>
            </span>
          </label>
          <span class="mode-switch-label" data-margin-mode-label="cost-margin">
            Cost + Margin % -> Selling Price
          </span>
        </div>
      </div>

      <div class="input-row">
        <label for="margin-cost">Cost (C)</label>
        <input id="margin-cost" type="number" value="60" min="0" step="0.01" />
      </div>

      <div id="margin-mode-cost-price" class="input-stack">
        <div class="input-row">
          <label for="margin-price">Selling Price (P)</label>
          <input id="margin-price" type="number" value="100" min="0" step="0.01" />
        </div>
      </div>

      <div id="margin-mode-cost-margin" class="input-stack is-hidden" aria-hidden="true" hidden>
        <div class="input-row">
          <label for="margin-percent">Gross Margin % (based on selling price)</label>
          <input id="margin-percent" type="number" value="40" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="margin-calc">
      Calculate Margin
    </button>

    <div class="result" id="margin-result" aria-live="polite"></div>
    <div class="result-detail" id="margin-result-detail" aria-live="polite"></div>
  </div>
</div>

<script
  type="module"
  src="/calculators/percentage-calculators/margin-calculator/module.js"
></script>
