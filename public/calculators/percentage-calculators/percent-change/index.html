<div id="calc-percent-change">
  <div class="calculator-ui">
    <p class="helper">Calculate percent change from A to B with the correct + or - sign.</p>

    <div class="input-stack">
      <div class="input-row">
        <label for="pct-change-a">Original Value (A)</label>
        <input id="pct-change-a" type="number" value="50" step="0.01" />
      </div>

      <div class="input-row">
        <label for="pct-change-b">New Value (B)</label>
        <input id="pct-change-b" type="number" value="60" step="0.01" />
      </div>
    </div>

    <button class="calculator-button full-width" type="button" id="pct-change-calc">Calculate Percent Change</button>

    <div class="result" id="pct-change-result" aria-live="polite"></div>
    <div class="result-detail" id="pct-change-result-detail" aria-live="polite"></div>
  </div>
</div>

<script type="module" src="/calculators/percentage-calculators/percent-change/module.js"></script>
