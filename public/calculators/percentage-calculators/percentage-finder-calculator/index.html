<div id="calc-what-percent-is-x-of-y">
  <style>
    .layout-main.layout-main--no-ads {
      grid-template-columns: minmax(200px, 230px) minmax(0, 1fr);
    }
  </style>

  <link
    rel="preload"
    href="/calculators/percentage-calculators/percentage-finder-calculator/calculator.css"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="/calculators/percentage-calculators/percentage-finder-calculator/calculator.css"
    />
  </noscript>

  <div class="calculator-ui">
    <section class="wpxy-hero" aria-label="What percent is X of Y calculator">
      <div class="wpxy-form-panel">
        <p class="helper">Enter a part and whole value to find what percent the part represents.</p>

        <div class="input-stack">
          <div class="input-row wpxy-input-row">
            <label for="wpxy-part">Part (X)</label>
            <input
              id="wpxy-part"
              type="number"
              value="25"
              min="0"
              max="1000000000"
              step="any"
              inputmode="decimal"
            />
          </div>

          <div class="input-row wpxy-input-row">
            <label for="wpxy-whole">Whole / Total (Y)</label>
            <input
              id="wpxy-whole"
              type="number"
              value="200"
              min="0.000001"
              max="1000000000"
              step="any"
              inputmode="decimal"
            />
          </div>
        </div>

        <button class="calculator-button full-width" type="button" id="wpxy-calc">
          Calculate Percentage
        </button>
      </div>

      <aside class="wpxy-answer-panel" aria-label="Answer summary card">
        <div class="wpxy-result-shell">
          <div class="result" id="wpxy-result" aria-live="polite"></div>
          <div class="result-detail" id="wpxy-result-detail" aria-live="polite"></div>
        </div>

        <div class="wpxy-card-list">
          <div class="wpxy-card-row">
            <span>Part (X)</span>
            <strong data-wpxy-card="part">25.00</strong>
          </div>
          <div class="wpxy-card-row">
            <span>Whole (Y)</span>
            <strong data-wpxy-card="whole">200.00</strong>
          </div>
          <div class="wpxy-card-row">
            <span>Result</span>
            <strong data-wpxy-card="percent">12.50%</strong>
          </div>
          <div class="wpxy-card-row">
            <span>Formula</span>
            <strong data-wpxy-card="formula">(X / Y) x 100</strong>
          </div>
        </div>
      </aside>
    </section>
  </div>
</div>

<script
  type="module"
  src="/calculators/percentage-calculators/percentage-finder-calculator/module.js"
></script>
